[build]
  command = "npm install && npm run build"
  publish = ".next"

# [[plugins]]
#   package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"
  NPM_FLAGS = "--legacy-peer-deps=false"

# Redirect rules for Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enable Netlify Forms and Identity
[context.production.environment]
  NODE_ENV = "production"
  NETLIFY_IDENTITY = "true"
