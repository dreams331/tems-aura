backend:
  name: git-gateway
  branch: main
  site_url: https://tems-aura.netlify.app

# Uncomment when testing locally
# local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # Gallery Collection
  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Evening Dresses", "Wedding Guest", "Custom Designs", "Luxury Pieces"] }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Display as 'Featured This Week' with social promotion" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime" }

  # Testimonials Collection
  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "name", widget: "string" }
      - { label: "Role/Title", name: "role", widget: "string" }
      - { label: "Testimonial", name: "content", widget: "text" }
      - { label: "Rating", name: "rating", widget: "number", default: 5, min: 1, max: 5 }
      - { label: "Client Photo", name: "image", widget: "image", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime" }

  # Homepage Settings
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/settings/homepage.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "TEMS AURA" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string", default: "Soft Luxury. Custom Made For You." }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Featured Section Title", name: "featured_title", widget: "string", default: "Featured Designs" }
          - { label: "Featured Section Description", name: "featured_description", widget: "text" }

      - label: "Contact Information"
        name: "contact"
        file: "content/settings/contact.json"
        fields:
          - { label: "Email", name: "email", widget: "string", default: "tems_aura@gmail.com" }
          - { label: "Phone", name: "phone", widget: "string", default: "+44 07554 416005" }
          - { label: "Instagram URL", name: "instagram", widget: "string", default: "https://instagram.com/tems_aura" }
          - { label: "Facebook URL", name: "facebook", widget: "string", default: "https://facebook.com" }
          - { label: "TikTok URL", name: "tiktok", widget: "string", default: "https://tiktok.com" }
          - { label: "Snapchat URL", name: "snapchat", widget: "string", default: "https://snapchat.com" }

      - label: "About Page"
        name: "about"
        file: "content/settings/about.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string", default: "About TEMS AURA" }
          - { label: "Brand Story", name: "story", widget: "markdown" }
          - { label: "Mission Statement", name: "mission", widget: "text" }
          - { label: "About Image", name: "image", widget: "image" }

  # Blog Posts (Optional for future)
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
